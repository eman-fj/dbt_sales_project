version: 2

sources:
  - name: raw
    database: SALES_DB
    schema: PUBLIC
    tables:
      - name: sales_data

models:
  - name: customer_sales_summary
    description: Aggregated sales per customer and product category

    columns:
      - name: customer_id
        description: Unique identifier of the customer
        tests:
          - not_null

      - name: product_category
        description: Category of purchased product

      - name: total_sales
        description: Total amount spent by the customer
        tests:
          - not_null